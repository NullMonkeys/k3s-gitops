---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - ingress.yaml
  - secrets.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: oci://ghcr.io/prometheus-community/charts
    version: 86.3.2
    releaseName: kube-prometheus-stack
    valuesFile: values.yaml
    namespace: monitoring
    includeCRDs: true
