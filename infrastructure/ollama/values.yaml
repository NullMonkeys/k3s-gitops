replicaCount: 1

ollama:
  gpu:
    enabled: false
  models:
    pull:
      - "qwen3-embedding:0.6b"

resources:
  requests:
    cpu: "2"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 4Gi

persistentVolume:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClass: longhorn

ingress:
  enabled: false

gateway:
  enabled: false

autoscaling:
  enabled: false
