---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - issuers.yml
  - secrets.yml

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.20.2
    releaseName: cert-manager
    valuesFile: values.yml
    namespace: cert-manager
    includeCRDs: true

namespace: cert-manager
