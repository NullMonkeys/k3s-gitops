---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: letsencrypt-http
  annotations:
    argocd.argoproj.io/sync-wave: "-5"

spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: no-reply@nullmonkeys.com

    privateKeySecretRef:
      name: letsencrypt-http

    solvers:
      - http01:
          ingress:
            class: traefik

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
  annotations:
    argocd.argoproj.io/sync-wave: "-5"

spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: no-reply@nullmonkeys.com

    privateKeySecretRef:
      name: letsencrypt-dns

    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secrets
              key: cloudflare-api-token
