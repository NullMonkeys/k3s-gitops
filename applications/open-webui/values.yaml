---
replicaCount: 3

ollama:
  enabled: false

ollamaUrls:
  - "http://ollama.ollama.svc.cluster.local:11434"

tika:
  enabled: false

pipelines:
  enabled: false

terminals:
  enabled: false

workload:
  kind: Deployment

websocket:
  enabled: true
  manager: redis
  url: "redis://redis-master.open-webui.svc.cluster.local:6379/0"
  redis:
    enabled: false

ingress:
  enabled: true
  class: traefik
  annotations:
    cert-manager.io/cluster-issuer: infisical-acme
  host: chat.nullmonkeys.com
  tls: true

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteMany
  storageClass: longhorn

enableOpenaiApi: false

extraEnvVars:
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-secrets
        key: webui-secret-key
  - name: WEBUI_URL
    value: "https://chat.nullmonkeys.com"
  - name: CORS_ALLOW_ORIGIN
    value: "https://chat.nullmonkeys.com"

  - name: OAUTH_CLIENT_ID
    value: "IpGPyo3tdm9TwHOnSP4oHCLT7eKDOuBIhyXyXTNU"
  - name: OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: open-webui-secrets
        key: oauth-client-secret
  - name: OAUTH_PROVIDER_NAME
    value: "authentik"
  - name: OAUTH_SCOPES
    value: "openid email profile roles"
  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "True"

  - name: OPENID_PROVIDER_URL
    value: "https://auth.nullmonkeys.com/application/o/open-webui/.well-known/openid-configuration"
  - name: OPENID_REDIRECT_URI
    value: "https://chat.nullmonkeys.com/oauth/oidc/callback"

  - name: ENABLE_OAUTH_SIGNUP
    value: "True"
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "True"
  - name: ENABLE_LOGIN_FORM
    value: "False"
  - name: ENABLE_PASSWORD_AUTH
    value: "False"

  - name: ENABLE_SIGNUP
    value: "False"
  - name: ENABLE_USER_WEBHOOKS
    value: "True"
  - name: ENABLE_USER_STATUS
    value: "False"
  - name: SHOW_ADMIN_DETAILS
    value: "False"
  - name: USER_AGENT
    value: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

  - name: ENABLE_EVALUATION_ARENA_MODELS
    value: "False"
  - name: ENABLE_MESSAGE_RATING
    value: "False"
  - name: ENABLE_COMMUNITY_SHARING
    value: "False"
  - name: ENABLE_TAGS_GENERATION
    value: "False"

  - name: ENABLE_DIRECT_CONNECTIONS
    value: "True"
  - name: ENABLE_API_KEYS
    value: "True"

  - name: ENABLE_IMAGE_GENERATION
    value: "False"
  - name: ENABLE_IMAGE_EDIT
    value: "False"

  - name: ENABLE_WEB_SEARCH
    value: "True"
  - name: ENABLE_SEARCH_QUERY_GENERATION
    value: "True"
  - name: WEB_SEARCH_RESULT_COUNT
    value: "5"
  - name: WEB_SEARCH_CONCURRENT_REQUESTS
    value: "10"
  - name: WEB_SEARCH_ENGINE
    value: "searxng"
  - name: SEARXNG_QUERY_URL
    value: "https://search.nullmonkeys.com/search?q=<query>"
  - name: SEARXNG_LANGUAGE
    value: "all"
  - name: WEB_LOADER_ENGINE
    value: "safe_web"

  - name: RAG_EMBEDDING_ENGINE
    value: "ollama"
  - name: RAG_EMBEDDING_MODEL
    value: "qwen3-embedding:0.6b"

  - name: CONTENT_EXTRACTION_ENGINE
    value: "mistral_ocr"
  - name: MISTRAL_OCR_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-secrets
        key: mistral-api-key

  - name: AUDIO_STT_ENGINE
    value: "mistral"
  - name: AUDIO_STT_MODEL
    value: "voxtral-mini-2602"
  - name: AUDIO_STT_MISTRAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-secrets
        key: mistral-api-key

  - name: AUDIO_TTS_ENGINE
    value: "mistral"
  - name: AUDIO_TTS_MODEL
    value: "voxtral-mini-tts-2603"
  - name: AUDIO_TTS_VOICE
    value: "gb_oliver_neutral"
  - name: AUDIO_TTS_MISTRAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-secrets
        key: mistral-api-key

  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: open-webui-db-app
        key: uri
  - name: VECTOR_DB
    value: "pgvector"
