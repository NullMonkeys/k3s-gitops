---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lobehub

resources:
  - lobehub-secrets.yaml
  - lobehub-deployment.yaml
  - lobehub-service.yaml
  - lobehub-ingress.yaml
  - lobehub-postgres.yaml

helmCharts:
  - name: redis
    repo: https://charts.bitnami.com/bitnami
    version: 27.0.17
    releaseName: redis
    namespace: lobehub
    valuesFile: redis-values.yaml
