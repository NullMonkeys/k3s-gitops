---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: librechat

resources:
  - secrets.yml

helmCharts:
  - name: librechat
    repo: oci://ghcr.io/danny-avila/librechat-chart/librechat
    version: 2.0.6
    releaseName: librechat
    namespace: librechat
    valuesFile: values.yml
    includeCRDs: true
