---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: searxng
  namespace: searxng

spec:
  replicas: 3

  selector:
    matchLabels:
      app: searxng

  template:
    metadata:
      labels:
        app: searxng

    spec:
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.6.24-e3126b89e
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secrets
                  key: secret-key

          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: limiter-config
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: limiter-config
          configMap:
            name: limiter-config
