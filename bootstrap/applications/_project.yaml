---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  sourceRepos:
    - "https://github.com/NullMonkeys/k3s-gitops.git"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
