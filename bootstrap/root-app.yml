---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root-app
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: "https://github.com/NullMonkeys/k3s-gitops.git"
      targetRevision: HEAD
      path: bootstrap/infrastructure

    - repoURL: "https://github.com/NullMonkeys/k3s-gitops.git"
      targetRevision: HEAD
      path: bootstrap/applications

  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
